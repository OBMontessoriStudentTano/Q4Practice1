<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q3 Skills Test</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body>
    <h1>Javascript Conditional Statements</h1>

    <input type="text" id="Age" class="form-control" placeholder="type here">
    <button class="btn btn-info" onclick="checkAge()"></button>
    
    <script>
        //checkAge
        function checkAge(){

        var age = document.getElementByID("Age").value; 
        
        if(isNaN(age) || age < 0 ){
           alert("Please input a valid number (If you don't want to get kidnapped)")
        }
        else if (age < 18){
            alert("You are too young, Baby...");
        }
        else if (age > 18){
            alert("You are of legal age")
        }
        else {
            alert("Your age could not be classified...oops..");
        }
    }
    </script>

</body>
</html>
